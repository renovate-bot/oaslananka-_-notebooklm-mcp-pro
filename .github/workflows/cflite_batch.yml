name: ClusterFuzzLite batch fuzzing

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * 2"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  BatchFuzzing:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          clean: false
      - name: Prepare self-hosted workspace
        uses: ./.github/actions/prepare-workspace
      - name: Install Python for fuzz smoke
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Run deterministic Python fuzz smoke
        shell: bash
        env:
          NLM_MCP_FUZZ_SMOKE: "1"
          UV_PROJECT_ENVIRONMENT: /tmp/nlm-fuzz-smoke-venv
        run: |
          uv sync --frozen --no-dev
          uv run --frozen --with atheris==2.3.0 python scripts/fuzz_smoke.py
      - name: Build fuzzers
        id: build
        continue-on-error: true
        uses: google/clusterfuzzlite/actions/build_fuzzers@82652fb49e77bc29c35da1167bb286e93c6bcc05 # v1
        with:
          language: python
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sanitizer: ${{ matrix.sanitizer }}
      - name: Run fuzzers
        id: run
        if: steps.build.outcome == 'success'
        continue-on-error: true
        uses: google/clusterfuzzlite/actions/run_fuzzers@82652fb49e77bc29c35da1167bb286e93c6bcc05 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 300
          mode: batch
          output-sarif: true
          sanitizer: ${{ matrix.sanitizer }}
      - name: Report ClusterFuzzLite action status
        shell: bash
        run: |
          echo "ClusterFuzzLite build outcome: ${{ steps.build.outcome }}"
          echo "ClusterFuzzLite run outcome: ${{ steps.run.outcome }}"
          if [ "${{ steps.build.outcome }}" != "success" ]; then
            echo "::notice::ClusterFuzzLite Docker action did not complete on this runner; deterministic fuzz smoke already passed."
          fi
