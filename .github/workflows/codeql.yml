name: CodeQL

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "41 3 * * 2"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: codeql
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: python
      - uses: github/codeql-action/analyze@v4
