name: CodeQL

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "41 3 * * 2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    name: codeql
    runs-on: [self-hosted, Linux, X64]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Prepare self-hosted workspace
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GITHUB_WORKSPACE:-}" ]; then
            echo "GITHUB_WORKSPACE is unset" >&2
            exit 1
          fi
          case "$GITHUB_WORKSPACE" in
            */_work/notebooklm-mcp-pro/notebooklm-mcp-pro) ;;
            *)
              echo "Refusing to clean unexpected workspace: $GITHUB_WORKSPACE" >&2
              exit 1
              ;;
          esac
          CLEAN_TARGETS=(
            "$GITHUB_WORKSPACE/storage"
            "$GITHUB_WORKSPACE/.venv"
            "$GITHUB_WORKSPACE/.pytest_cache"
            "$GITHUB_WORKSPACE/.ruff_cache"
            "$GITHUB_WORKSPACE/.mypy_cache"
            "$GITHUB_WORKSPACE/htmlcov"
            "$GITHUB_WORKSPACE/dist"
            "$GITHUB_WORKSPACE/build"
          )
          if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo -n rm -rf "${CLEAN_TARGETS[@]}"
          else
            rm -rf "${CLEAN_TARGETS[@]}"
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          languages: python
      - uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
