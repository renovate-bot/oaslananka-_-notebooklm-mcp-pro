name: E2E

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  e2e:
    name: e2e
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Prepare self-hosted workspace
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GITHUB_WORKSPACE:-}" ]; then
            echo "GITHUB_WORKSPACE is unset" >&2
            exit 1
          fi
          case "$GITHUB_WORKSPACE" in
            */_work/notebooklm-mcp-pro/notebooklm-mcp-pro|*/work/notebooklm-mcp-pro/notebooklm-mcp-pro) ;;
            *)
              echo "Refusing to clean unexpected workspace: $GITHUB_WORKSPACE" >&2
              exit 1
              ;;
          esac
          CLEAN_TARGETS=(
            "$GITHUB_WORKSPACE/storage"
            "$GITHUB_WORKSPACE/.venv"
            "$GITHUB_WORKSPACE/.pytest_cache"
            "$GITHUB_WORKSPACE/.ruff_cache"
            "$GITHUB_WORKSPACE/.mypy_cache"
            "$GITHUB_WORKSPACE/htmlcov"
            "$GITHUB_WORKSPACE/dist"
            "$GITHUB_WORKSPACE/build"
          )
          if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo -n rm -rf "${CLEAN_TARGETS[@]}"
          else
            rm -rf "${CLEAN_TARGETS[@]}"
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: uv sync --extra dev --extra browser
      - run: uv run pytest -m e2e tests/e2e --no-cov
        env:
          NLM_MCP_RUN_E2E: "1"
          NLM_MCP_NOTEBOOKLM_AUTH_JSON: ${{ secrets.NLM_MCP_NOTEBOOKLM_AUTH_JSON }}
