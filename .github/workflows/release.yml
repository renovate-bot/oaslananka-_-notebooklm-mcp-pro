name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-tag:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Prepare self-hosted workspace
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GITHUB_WORKSPACE:-}" ]; then
            echo "GITHUB_WORKSPACE is unset" >&2
            exit 1
          fi
          case "$GITHUB_WORKSPACE" in
            */_work/notebooklm-mcp-pro/notebooklm-mcp-pro) ;;
            *)
              echo "Refusing to clean unexpected workspace: $GITHUB_WORKSPACE" >&2
              exit 1
              ;;
          esac
          CLEAN_TARGETS=(
            "$GITHUB_WORKSPACE/storage"
            "$GITHUB_WORKSPACE/.venv"
            "$GITHUB_WORKSPACE/.pytest_cache"
            "$GITHUB_WORKSPACE/.ruff_cache"
            "$GITHUB_WORKSPACE/.mypy_cache"
            "$GITHUB_WORKSPACE/htmlcov"
            "$GITHUB_WORKSPACE/dist"
            "$GITHUB_WORKSPACE/build"
          )
          if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo -n rm -rf "${CLEAN_TARGETS[@]}"
          else
            rm -rf "${CLEAN_TARGETS[@]}"
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Validate tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION != pyproject.toml $PKG_VERSION" && exit 1
          fi

  release:
    needs: validate-tag
    runs-on: [self-hosted, Linux, X64]
    environment: pypi
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Prepare self-hosted workspace
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GITHUB_WORKSPACE:-}" ]; then
            echo "GITHUB_WORKSPACE is unset" >&2
            exit 1
          fi
          case "$GITHUB_WORKSPACE" in
            */_work/notebooklm-mcp-pro/notebooklm-mcp-pro) ;;
            *)
              echo "Refusing to clean unexpected workspace: $GITHUB_WORKSPACE" >&2
              exit 1
              ;;
          esac
          CLEAN_TARGETS=(
            "$GITHUB_WORKSPACE/storage"
            "$GITHUB_WORKSPACE/.venv"
            "$GITHUB_WORKSPACE/.pytest_cache"
            "$GITHUB_WORKSPACE/.ruff_cache"
            "$GITHUB_WORKSPACE/.mypy_cache"
            "$GITHUB_WORKSPACE/htmlcov"
            "$GITHUB_WORKSPACE/dist"
            "$GITHUB_WORKSPACE/build"
          )
          if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
            sudo -n rm -rf "${CLEAN_TARGETS[@]}"
          else
            rm -rf "${CLEAN_TARGETS[@]}"
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: uv sync --extra dev
      - run: uv run python -m build
      - run: uv run cyclonedx-py environment --output-format json -o sbom.json
      - name: Sign release artifacts
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: |
            dist/*
            sbom.json
          release-signing-artifacts: false
      - name: Set up Docker Buildx
        run: |
          BUILDER="nlm-builder-${GITHUB_RUN_ID}"
          docker buildx rm "$BUILDER" >/dev/null 2>&1 || true
          docker buildx create --name "$BUILDER" --use
          docker buildx inspect --bootstrap
      - name: Build and push Docker image
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MINOR="${VERSION%.*}"
          MAJOR="${VERSION%%.*}"
          IMAGE="ghcr.io/oaslananka/notebooklm-mcp-pro"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker buildx build --push -f deploy/Dockerfile \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:${MINOR}" \
            -t "${IMAGE}:${MAJOR}" \
            -t "${IMAGE}:latest" \
            .
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            dist/*
            sbom.json
            sbom.json.sigstore.json
          generate_release_notes: true
      - name: Remove Docker Buildx builder
        if: always()
        run: docker buildx rm "nlm-builder-${GITHUB_RUN_ID}" >/dev/null 2>&1 || true
