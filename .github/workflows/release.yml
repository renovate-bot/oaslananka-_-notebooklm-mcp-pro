name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-tag:
    runs-on: [self-hosted, Linux, X64]
    permissions:
      checks: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          clean: false
      - name: Prepare self-hosted workspace
        uses: ./.github/actions/prepare-workspace
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Validate tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION != pyproject.toml $PKG_VERSION" && exit 1
          fi
      - name: Verify CI passed on tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          RESULT=$(gh api "repos/${{ github.repository }}/commits/${SHA}/check-runs" \
            --jq '[.check_runs[] | select(.name == "CI")] | sort_by(.completed_at) | reverse | .[0].conclusion // "not_found"')
          if [ "$RESULT" != "success" ]; then
            echo "::error::CI check-run 'CI' did not pass on ${SHA} (result: ${RESULT})"
            echo "Run CI on this commit first, then re-tag."
            exit 1
          fi

  release:
    needs: validate-tag
    runs-on: [self-hosted, Linux, X64]
    environment: pypi
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          clean: false
      - name: Prepare self-hosted workspace
        uses: ./.github/actions/prepare-workspace
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: uv sync --extra dev
      - run: uv run python -m build
      - name: Verify release distributions
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          from pathlib import Path

          dist = Path("dist")
          files = sorted(path.name for path in dist.glob("*"))
          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          expected_prefix = f"notebooklm_mcp_pro-{version}"
          has_wheel = any(name.endswith(".whl") for name in files)
          has_sdist = any(name.endswith(".tar.gz") for name in files)
          unexpected = [name for name in files if not name.startswith(expected_prefix)]
          if not has_wheel or not has_sdist:
              raise SystemExit(f"Missing wheel or source distribution in dist/: {files}")
          if unexpected:
              raise SystemExit(f"Unexpected distribution file for {version}: {unexpected}")
          print("Release distributions:")
          for name in files:
              print(f"- dist/{name}")
          PY
      - run: uv run cyclonedx-py environment --output-format json -o sbom.json
      - name: Generate build provenance attestations
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz
            sbom.json
      - name: Set up Docker Buildx
        run: |
          BUILDER="nlm-builder-${GITHUB_RUN_ID}"
          docker buildx rm "$BUILDER" >/dev/null 2>&1 || true
          docker buildx create --name "$BUILDER" --use
          docker buildx inspect --bootstrap
      - name: Build and push Docker image
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MINOR="${VERSION%.*}"
          MAJOR="${VERSION%%.*}"
          IMAGE="ghcr.io/oaslananka/notebooklm-mcp-pro"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker buildx build --push -f deploy/Dockerfile \
            --provenance=true \
            --sbom=true \
            --build-arg IMAGE_VERSION="${VERSION}" \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:${MINOR}" \
            -t "${IMAGE}:${MAJOR}" \
            -t "${IMAGE}:latest" \
            .
      - name: Publish to PyPI
        run: |
          uv publish \
            --trusted-publishing always \
            --check-url https://pypi.org/simple/notebooklm-mcp-pro/ \
            dist/*.whl dist/*.tar.gz
      - name: Sign release artifacts
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: |
            dist/*.whl
            dist/*.tar.gz
            sbom.json
          release-signing-artifacts: false
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            dist/*
            sbom.json
            sbom.json.sigstore.json
          generate_release_notes: true
      - name: Remove Docker Buildx builder
        if: always()
        run: docker buildx rm "nlm-builder-${GITHUB_RUN_ID}" >/dev/null 2>&1 || true
