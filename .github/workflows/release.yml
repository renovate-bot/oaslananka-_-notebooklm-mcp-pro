name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-tag:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Validate tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $TAG_VERSION != pyproject.toml $PKG_VERSION" && exit 1
          fi

  release:
    needs: validate-tag
    runs-on: [self-hosted, Linux, X64]
    environment: pypi
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: uv sync --extra dev
      - run: uv run python -m build
      - run: uv run cyclonedx-py environment --output-format json -o sbom.json
      - name: Set up Docker Buildx
        run: |
          BUILDER="nlm-builder-${GITHUB_RUN_ID}"
          docker buildx rm "$BUILDER" >/dev/null 2>&1 || true
          docker buildx create --name "$BUILDER" --use
          docker buildx inspect --bootstrap
      - name: Build and push Docker image
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MINOR="${VERSION%.*}"
          MAJOR="${VERSION%%.*}"
          IMAGE="ghcr.io/oaslananka/notebooklm-mcp-pro"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker buildx build --push -f deploy/Dockerfile \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:${MINOR}" \
            -t "${IMAGE}:${MAJOR}" \
            -t "${IMAGE}:latest" \
            .
      - name: Publish to PyPI
        run: uv publish --trusted-publishing always dist/*
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
            sbom.json
          generate_release_notes: true
      - name: Remove Docker Buildx builder
        if: always()
        run: docker buildx rm "nlm-builder-${GITHUB_RUN_ID}" >/dev/null 2>&1 || true
