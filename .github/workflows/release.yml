name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  package:
    name: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --extra dev --extra browser
      - run: uv run python -m build
      - run: uv run cyclonedx-py project -o sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            sbom.json

  docker:
    name: docker
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref_name, 'v0.8.') || startsWith(github.ref_name, 'v0.9.') || startsWith(github.ref_name, 'v1.')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        if: ${{ !startsWith(github.ref_name, 'v1.') }}
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/oaslananka-lab/notebooklm-mcp-pro:${{ github.ref_name }}
      - uses: docker/build-push-action@v6
        if: startsWith(github.ref_name, 'v1.')
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/oaslananka-lab/notebooklm-mcp-pro:latest
            ghcr.io/oaslananka-lab/notebooklm-mcp-pro:${{ github.ref_name }}

  publish-pypi:
    name: publish-pypi
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref_name, 'v1.')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
