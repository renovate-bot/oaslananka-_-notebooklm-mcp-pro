name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 3"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: scorecard
    runs-on: [self-hosted, Linux, X64]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Run OpenSSF Scorecard
        shell: bash
        env:
          GITHUB_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCORECARD_SHA256: "83b90a05c1540ef1390db1cd5711e5fd04be9c1d8537fb84d39d02092d6a8dff"
          SCORECARD_VERSION: "5.5.0"
        run: |
          set -euo pipefail
          archive="scorecard_${SCORECARD_VERSION}_linux_amd64.tar.gz"
          url="https://github.com/ossf/scorecard/releases/download/v${SCORECARD_VERSION}/${archive}"
          curl --fail --show-error --silent --location \
            --retry 3 --retry-delay 2 --retry-connrefused \
            --connect-timeout 15 --max-time 180 \
            -o "$archive" "$url"
          echo "${SCORECARD_SHA256}  ${archive}" | sha256sum -c -
          tar -xzf "$archive"
          ./scorecard version
          ./scorecard \
            --repo="github.com/${GITHUB_REPOSITORY}" \
            --commit="${GITHUB_SHA}" \
            --format=json \
            --show-details \
            --output=scorecard.json
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          data = json.loads(Path("scorecard.json").read_text(encoding="utf-8"))
          checks = sorted(data.get("checks", []), key=lambda item: item.get("name", ""))
          print("## OpenSSF Scorecard")
          print()
          print(f"Aggregate score: **{data.get('score', 'n/a')}**")
          print()
          print("| Check | Score | Reason |")
          print("| --- | ---: | --- |")
          for check in checks:
              reason = str(check.get("reason", "")).replace("|", "\\|")
              print(f"| {check.get('name', '')} | {check.get('score', '')} | {reason} |")

          rules = []
          for check in checks:
              name = str(check.get("name", "unknown"))
              reason = str(check.get("reason", ""))
              rules.append(
                  {
                      "id": name,
                      "name": name,
                      "shortDescription": {"text": name},
                      "fullDescription": {"text": reason[:1000] or name},
                      "helpUri": "https://github.com/ossf/scorecard/blob/main/docs/checks.md",
                      "properties": {"score": check.get("score")},
                  }
              )

          sarif = {
              "version": "2.1.0",
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "runs": [
                  {
                      "tool": {
                          "driver": {
                              "name": "OpenSSF Scorecard",
                              "informationUri": "https://github.com/ossf/scorecard",
                              "rules": rules,
                          }
                      },
                      "results": [],
                  }
              ],
          }
          Path("scorecard.sarif").write_text(json.dumps(sarif), encoding="utf-8")
          PY
      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: scorecard.sarif

  publish:
    name: scorecard-publish
    if: ${{ github.ref == 'refs/heads/main' && vars.ENABLE_GITHUB_HOSTED_SCORECARD == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    steps:
      - name: Publish OpenSSF Scorecard results
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-published.sarif
          results_format: sarif
          publish_results: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
