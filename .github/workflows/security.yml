name: Security

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dependency-audit:
    name: pip-audit
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          clean: false
      - name: Prepare self-hosted workspace
        uses: ./.github/actions/prepare-workspace
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: uv sync --extra dev --extra browser
      - run: uv export --extra dev --extra browser --format requirements-txt --no-emit-project --no-hashes --output-file "${RUNNER_TEMP}/requirements-audit.txt"
      - run: uv run pip-audit --strict -r "${RUNNER_TEMP}/requirements-audit.txt"

  bandit:
    name: bandit
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          clean: false
      - name: Prepare self-hosted workspace
        uses: ./.github/actions/prepare-workspace
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: uv sync --extra dev
      - name: Run bandit
        run: uv run bandit -r src -lll -f sarif -o bandit.sarif
      - uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        if: always()
        with:
          sarif_file: bandit.sarif

  gitleaks:
    name: gitleaks
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          clean: false
          fetch-depth: 0
      - name: Prepare self-hosted workspace
        uses: ./.github/actions/prepare-workspace
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.0"
          GITLEAKS_SHA256: "79a3ab579b53f71efd634f3aaf7e04a0fa0cf206b7ed434638d1547a2470a66e"
        run: |
          curl -fsSLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | sha256sum -c -
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" gitleaks
          chmod +x gitleaks
      - name: Run gitleaks
        run: ./gitleaks detect --config .gitleaks.toml --redact --source .

  security-ok:
    name: Security
    if: ${{ always() && !cancelled() }}
    needs: [dependency-audit, bandit, gitleaks]
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Check security gates
        env:
          AUDIT_RESULT: ${{ needs.dependency-audit.result }}
          BANDIT_RESULT: ${{ needs.bandit.result }}
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
        run: |
          FAILED=()
          [ "$AUDIT_RESULT" != "success" ] && FAILED+=("pip-audit: $AUDIT_RESULT")
          [ "$BANDIT_RESULT" != "success" ] && FAILED+=("bandit: $BANDIT_RESULT")
          [ "$GITLEAKS_RESULT" != "success" ] && FAILED+=("gitleaks: $GITLEAKS_RESULT")
          if [ ${#FAILED[@]} -gt 0 ]; then
            printf "Security gate failed:\n"
            printf "  - %s\n" "${FAILED[@]}"
            exit 1
          fi
          echo "All security gates passed."
