name: Security

on:
  pull_request:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  dependency-audit:
    name: pip-audit
    runs-on: [self-hosted, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --extra dev --extra browser
      - run: uv export --extra dev --extra browser --format requirements-txt --no-emit-project --no-hashes --output-file "${RUNNER_TEMP}/requirements-audit.txt"
      - run: uv run pip-audit --strict -r "${RUNNER_TEMP}/requirements-audit.txt"

  bandit:
    name: bandit
    runs-on: [self-hosted, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --extra dev
      - name: Run bandit
        run: uv run bandit -r src -lll -f sarif -o bandit.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif

  gitleaks:
    name: gitleaks
    runs-on: [self-hosted, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest \
            detect --config /repo/.gitleaks.toml --redact --source /repo
