name: Security

on:
  pull_request:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  dependency-audit:
    name: pip-audit
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: uv sync --extra dev --extra browser
      - run: uv export --extra dev --extra browser --format requirements-txt --no-emit-project --no-hashes --output-file "${RUNNER_TEMP}/requirements-audit.txt"
      - run: uv run pip-audit --strict -r "${RUNNER_TEMP}/requirements-audit.txt"

  bandit:
    name: bandit
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - run: uv sync --extra dev
      - name: Run bandit
        run: uv run bandit -r src -lll -f sarif -o bandit.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit.sarif

  gitleaks:
    name: gitleaks
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest \
            detect --config /repo/.gitleaks.toml --redact --source /repo
