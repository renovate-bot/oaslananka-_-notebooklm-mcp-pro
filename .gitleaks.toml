title = "notebooklm-mcp-pro gitleaks config"

[[rules]]
id = "notebooklm-auth"
description = "NotebookLM auth JSON"
regex = '''notebooklm_auth.*["'].*cookies'''
tags = ["notebooklm", "credentials"]

[[rules.allowlists]]
id = "notebooklm-auth-examples"
description = "Documented placeholder examples"
paths = [
  '''\.env\.example$''',
  '''deploy/k8s/secret\.yaml\.example$''',
  '''docs/.*''',
  '''README\.md$''',
  '''tests/.*''',
  '''\.gitleaks\.toml$''',
]
