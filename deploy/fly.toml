app = "notebooklm-mcp-pro"
primary_region = "iad"

[build]
  dockerfile = "deploy/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.healthcheck]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    port = 8080
    timeout = "5s"
    type = "http"
